
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KennisSprint Account aanmaken</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .login-card {
      width: 100%;
      max-width: 460px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      padding: 40px 32px;
      box-sizing: border-box;
    }

    .login-title {
      margin: 0 0 20px 0;
      text-align: center;
      font-size: 3rem;
      line-height: 1.05;
      color: #0f172a;
    }

    .intro {
      text-align: center;
      margin: 0 0 28px 0;
      color: #475569;
      font-size: 1rem;
      line-height: 1.5;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-weight: 700;
      font-size: 1rem;
      color: #0f172a;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font: inherit;
      box-sizing: border-box;
      background: #ffffff;
      color: #0f172a;
    }

    .login-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }

    .login-actions button {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      font: inherit;
      cursor: pointer;
    }

    #registerButton {
      background: #0f172a;
      color: #ffffff;
      border: none;
    }

    .secondary-button {
      background: transparent;
      color: #0f172a;
      border: 1px solid #cbd5e1;
    }

    #messageEl {
      min-height: 24px;
      margin-top: 12px;
      color: #475569;
      text-align: center;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <h1 class="login-title">Account aanmaken</h1>
     <p class="intro">
  Maak een account aan met je e-mailadres en wachtwoord. Daarna kun je direct inloggen.
</p>

      <div id="registerForm" class="login-form">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input id="email" type="email" placeholder="jouw@email.nl" autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Wachtwoord</label>
          <input id="password" type="password" placeholder="Kies een wachtwoord" autocomplete="new-password">
        </div>

        <div class="login-actions">
          <button id="registerButton" type="button">Account aanmaken</button>
          <button id="backButton" type="button" class="secondary-button">Terug naar login</button>
        </div>

        <p id="messageEl"></p>
      </div>

      <div id="successPanel" hidden>
   <p class="intro" style="margin-bottom: 20px;">
  Je account is aangemaakt. Je kunt nu inloggen met je e-mailadres en wachtwoord.
</p>

        <div class="login-actions">
          <button id="successBackButton" type="button" class="secondary-button">Terug naar login</button>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script>
    const supabaseClient = window.supabaseClient;

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");

    const registerForm = document.getElementById("registerForm");
    const successPanel = document.getElementById("successPanel");
    const messageEl = document.getElementById("messageEl");

    const registerButton = document.getElementById("registerButton");
    const backButton = document.getElementById("backButton");
    const successBackButton = document.getElementById("successBackButton");

    async function register() {
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email) {
        messageEl.textContent = "Vul je e-mailadres in.";
        return;
      }

      if (!password || password.length < 6) {
        messageEl.textContent = "Kies een wachtwoord van minimaal 6 tekens.";
        return;
      }

      messageEl.textContent = "Bezig met account aanmaken...";

const { data, error } = await supabaseClient.auth.signUp({
  email,
  password
});

      console.log("signUp result:", { data, error });

      if (error) {
        messageEl.textContent = "FOUT: " + error.message;
        alert(error.message);
        return;
      }

      const userId = data?.user?.id;

      if (userId) {
        const { error: profileError } = await supabaseClient
          .from("profiles")
          .upsert(
            {
              id: userId,
              display_name: null,
              level: null,
              grade: null
            },
            {
              onConflict: "id"
            }
          );

        if (profileError) {
          messageEl.textContent = "Account gemaakt, maar profiel initialiseren mislukte: " + profileError.message;
          return;
        }
      }

      messageEl.textContent = "";
      registerForm.hidden = true;
      successPanel.hidden = false;
    }

    function goToLogin() {
      window.location.href = "login.html";
    }

    registerButton.addEventListener("click", register);
    backButton.addEventListener("click", goToLogin);
    successBackButton.addEventListener("click", goToLogin);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Docent Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="page">
    <div class="card">
      <h1>Docent Dashboard</h1>

      <table id="dashboardTable" style="width:100%; margin-top:20px;">
        <thead>
          <tr>
            <th>Naam</th>
            <th>Aantal sessies</th>
            <th>Totaal vragen</th>
            <th>Laatste activiteit</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>

  <script>
    const supabase = window.supabaseClient;

  async function loadDashboard() {
  const { data: sessions, error: sessionsError } = await supabase
    .from("student_sessions")
    .select("user_id, started_at, question_count");

  if (sessionsError) {
    console.error("student_sessions fout:", sessionsError);
    return;
  }

  const { data: profiles, error: profilesError } = await supabase
    .from("profiles")
    .select("id, display_name");

  if (profilesError) {
    console.error("profiles fout:", profilesError);
    return;
  }

  const profileMap = {};
  profiles.forEach((profile) => {
    profileMap[profile.id] = profile.display_name || "Onbekend";
  });

  const perUser = {};

  sessions.forEach((row) => {
    const uid = row.user_id;

    if (!perUser[uid]) {
      perUser[uid] = {
        name: profileMap[uid] || "Onbekend",
        sessions: 0,
        totalQuestions: 0,
        lastActivity: row.started_at
      };
    }

    perUser[uid].sessions += 1;
    perUser[uid].totalQuestions += row.question_count || 0;

    if (row.started_at > perUser[uid].lastActivity) {
      perUser[uid].lastActivity = row.started_at;
    }
  });

  const tbody = document.querySelector("#dashboardTable tbody");
  tbody.innerHTML = "";

  Object.values(perUser).forEach((user) => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${user.name}</td>
      <td>${user.sessions}</td>
      <td>${user.totalQuestions}</td>
      <td>${new Date(user.lastActivity).toLocaleString()}</td>
    `;

    tbody.appendChild(tr);
  });
}

    loadDashboard();
  </script>

</body>
</html>

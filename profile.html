
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KennisSprint Profiel</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .profile-card {
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
    }

   .account-block {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-top: 16px;
}

.account-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding-bottom: 12px;
  border-bottom: 1px solid #e5e7eb;
}

    .account-label {
      font-weight: 700;
      font-size: 1rem;
      color: #0f172a;
    }

    .account-value-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      color: #475569;
      font-size: 1rem;
    }

    .edit-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: #f8fafc;
    }

.edit-panel input,
.edit-panel select {
  width: 100%;
  max-width: 420px;
  padding: 12px 14px;
  border: 1px solid #cbd5e1;
  border-radius: 10px;
  font: inherit;
  background: #fff;
}

    .edit-actions,
    .profile-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .text-button,
    .secondary-button {
      background: transparent;
      color: #0f172a;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
    }

    .profile-message {
      min-height: 24px;
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card profile-card">
      <h1>KennisSprint</h1>
      <p class="intro">Account</p>

     <div class="account-block">
  <div class="account-row">
    <div class="account-label">Jouw naam</div>
    <div class="account-value-row">
      <span id="displayNameText">Nog niet ingesteld</span>
      <button id="editNameButton" type="button" class="text-button">Wijzig</button>
    </div>
  </div>

  <div id="editNamePanel" class="edit-panel" hidden>
    <label for="displayNameInput"><strong>Nieuwe schermnaam</strong></label>
    <input id="displayNameInput" type="text" placeholder="Bijvoorbeeld: Stijn">
    <div class="edit-actions">
      <button id="saveNameButton" type="button">Opslaan</button>
      <button id="cancelEditButton" type="button" class="secondary-button">Annuleren</button>
    </div>
  </div>

  <div class="account-row">
    <div class="account-label">Niveau</div>
    <div class="account-value-row">
      <span id="levelText">Nog niet ingesteld</span>
      <button id="editLevelButton" type="button" class="text-button">Wijzig</button>
    </div>
  </div>

  <div id="editLevelPanel" class="edit-panel" hidden>
    <label for="levelSelect"><strong>Kies niveau</strong></label>
    <select id="levelSelect">
      <option value="">Kies niveau</option>
      <option value="mavo">mavo</option>
      <option value="havo">havo</option>
      <option value="vwo">vwo</option>
    </select>
    <div class="edit-actions">
      <button id="saveLevelButton" type="button">Opslaan</button>
      <button id="cancelLevelButton" type="button" class="secondary-button">Annuleren</button>
    </div>
  </div>

  <div class="account-row">
    <div class="account-label">Jaar</div>
    <div class="account-value-row">
      <span id="gradeText">Nog niet ingesteld</span>
      <button id="editGradeButton" type="button" class="text-button">Wijzig</button>
    </div>
  </div>

  <div id="editGradePanel" class="edit-panel" hidden>
    <label for="gradeSelect"><strong>Kies jaar</strong></label>
    <select id="gradeSelect">
      <option value="">Kies jaar</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
    </select>
    <div class="edit-actions">
      <button id="saveGradeButton" type="button">Opslaan</button>
      <button id="cancelGradeButton" type="button" class="secondary-button">Annuleren</button>
    </div>
  </div>

  <div class="account-row">
    <div class="account-label">E-mailadres</div>
    <div class="account-value-row">
      <span id="emailText">Laden...</span>
    </div>
  </div>

  <div class="account-row">
    <div class="account-label">Wachtwoord</div>
    <div class="account-value-row">
      <button id="resetPasswordButton" type="button" class="text-button">Reset e-mail sturen</button>
    </div>
  </div>
</div>

<p id="profileMessage" class="intro profile-message"></p>

      <div class="profile-actions">
        <button id="startButton" type="button">Naar cursussen</button>
        <button id="logoutButton" type="button" class="secondary-button">Uitloggen</button>
      </div>
    </section>
  </main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script>
  const supabaseClient = window.supabaseClient;

  const displayNameText = document.getElementById("displayNameText");
  const levelText = document.getElementById("levelText");
  const gradeText = document.getElementById("gradeText");
  const emailText = document.getElementById("emailText");

  const editNameButton = document.getElementById("editNameButton");
  const editNamePanel = document.getElementById("editNamePanel");
  const displayNameInput = document.getElementById("displayNameInput");
  const saveNameButton = document.getElementById("saveNameButton");
  const cancelEditButton = document.getElementById("cancelEditButton");

  const editLevelButton = document.getElementById("editLevelButton");
  const editLevelPanel = document.getElementById("editLevelPanel");
  const levelSelect = document.getElementById("levelSelect");
  const saveLevelButton = document.getElementById("saveLevelButton");
  const cancelLevelButton = document.getElementById("cancelLevelButton");

  const editGradeButton = document.getElementById("editGradeButton");
  const editGradePanel = document.getElementById("editGradePanel");
  const gradeSelect = document.getElementById("gradeSelect");
  const saveGradeButton = document.getElementById("saveGradeButton");
  const cancelGradeButton = document.getElementById("cancelGradeButton");

  const resetPasswordButton = document.getElementById("resetPasswordButton");
  const logoutButton = document.getElementById("logoutButton");
  const startButton = document.getElementById("startButton");
  const profileMessage = document.getElementById("profileMessage");

  let currentUser = null;
  let currentDisplayName = "";
  let currentLevel = "";
  let currentGrade = "";
  async function requireAuth() {
    const { data, error } = await supabaseClient.auth.getUser();

    if (error || !data?.user) {
      window.location.href = "login.html";
      return null;
    }

    return data.user;
  }

  function openEditPanel() {
    displayNameInput.value = currentDisplayName || "";
    editNamePanel.hidden = false;
    displayNameInput.focus();
  }

  function closeEditPanel() {
    editNamePanel.hidden = true;
    displayNameInput.value = "";
  }

  function openLevelPanel() {
    levelSelect.value = currentLevel || "";
    editLevelPanel.hidden = false;
    levelSelect.focus();
  }

  function closeLevelPanel() {
    editLevelPanel.hidden = true;
    levelSelect.value = "";
  }

  function openGradePanel() {
    gradeSelect.value = currentGrade || "";
    editGradePanel.hidden = false;
    gradeSelect.focus();
  }

  function closeGradePanel() {
    editGradePanel.hidden = true;
    gradeSelect.value = "";
  }
  async function loadProfile() {
    const user = await requireAuth();
    if (!user) return;

    currentUser = user;
    emailText.textContent = user.email || "-";

const { data, error } = await supabaseClient
  .from("profiles")
  .select("display_name, level, grade")
  .eq("id", user.id)
  .maybeSingle();

    if (error) {
      profileMessage.textContent = "Profiel laden mislukt: " + error.message;
      return;
    }

    currentDisplayName = data?.display_name?.trim() || "";
currentLevel = data?.level?.trim() || "";
currentGrade = data?.grade?.trim() || "";

displayNameText.textContent = currentDisplayName || "Nog niet ingesteld";
levelText.textContent = currentLevel || "Nog niet ingesteld";
gradeText.textContent = currentGrade || "Nog niet ingesteld";

if (!currentDisplayName) {
  openEditPanel();
}
  }

    async function saveName() {
    if (!currentUser) return;

    const newDisplayName = displayNameInput.value.trim();

    if (!newDisplayName) {
      profileMessage.textContent = "Vul een schermnaam in.";
      return;
    }

    profileMessage.textContent = "Bezig met opslaan...";

    const { error } = await supabaseClient
      .from("profiles")
      .upsert(
        {
          id: currentUser.id,
          display_name: newDisplayName,
          level: currentLevel || null,
          grade: currentGrade || null
        },
        {
          onConflict: "id"
        }
      );

    if (error) {
      profileMessage.textContent = "Opslaan mislukt: " + error.message;
      return;
    }

    currentDisplayName = newDisplayName;
    displayNameText.textContent = newDisplayName;
    profileMessage.textContent = "Schermnaam opgeslagen.";
    closeEditPanel();
  }

  async function saveLevel() {
    if (!currentUser) return;

    const newLevel = levelSelect.value.trim();

    if (!newLevel) {
      profileMessage.textContent = "Kies een niveau.";
      return;
    }

    profileMessage.textContent = "Bezig met opslaan...";

    const { error } = await supabaseClient
      .from("profiles")
      .upsert(
        {
          id: currentUser.id,
          display_name: currentDisplayName || null,
          level: newLevel,
          grade: currentGrade || null
        },
        {
          onConflict: "id"
        }
      );

    if (error) {
      profileMessage.textContent = "Opslaan mislukt: " + error.message;
      return;
    }

    currentLevel = newLevel;
    levelText.textContent = newLevel;
    profileMessage.textContent = "Niveau opgeslagen.";
    closeLevelPanel();
  }

  async function saveGrade() {
    if (!currentUser) return;

    const newGrade = gradeSelect.value.trim();

    if (!newGrade) {
      profileMessage.textContent = "Kies een jaar.";
      return;
    }

    profileMessage.textContent = "Bezig met opslaan...";

    const { error } = await supabaseClient
      .from("profiles")
      .upsert(
        {
          id: currentUser.id,
          display_name: currentDisplayName || null,
          level: currentLevel || null,
          grade: newGrade
        },
        {
          onConflict: "id"
        }
      );

    if (error) {
      profileMessage.textContent = "Opslaan mislukt: " + error.message;
      return;
    }

    currentGrade = newGrade;
    gradeText.textContent = newGrade;
    profileMessage.textContent = "Jaar opgeslagen.";
    closeGradePanel();
  }

  async function sendPasswordReset() {
    if (!currentUser?.email) return;

    profileMessage.textContent = "Bezig met reset e-mail versturen...";

    const { error } = await supabaseClient.auth.resetPasswordForEmail(currentUser.email, {
      redirectTo: window.location.origin + window.location.pathname.replace("profile.html", "login.html")
    });

    if (error) {
      profileMessage.textContent = "Reset mislukt: " + error.message;
      return;
    }

    profileMessage.textContent = "Reset e-mail verstuurd.";
  }

  async function logout() {
    await supabaseClient.auth.signOut();
    window.location.href = "login.html";
  }

  editNameButton.addEventListener("click", openEditPanel);
  saveNameButton.addEventListener("click", saveName);
  cancelEditButton.addEventListener("click", closeEditPanel);

  editLevelButton.addEventListener("click", openLevelPanel);
  saveLevelButton.addEventListener("click", saveLevel);
  cancelLevelButton.addEventListener("click", closeLevelPanel);

  editGradeButton.addEventListener("click", openGradePanel);
  saveGradeButton.addEventListener("click", saveGrade);
  cancelGradeButton.addEventListener("click", closeGradePanel);

  resetPasswordButton.addEventListener("click", sendPasswordReset);
  logoutButton.addEventListener("click", logout);
  startButton.addEventListener("click", () => {
    window.location.href = "index.html";
  });

  loadProfile();
</script>
</body>
</html>


<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KennisSprint Profiel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="card" style="max-width: 640px; position: relative;">
      <h1>KennisSprint</h1>
      <p class="intro">Kies een schermnaam die in de app zichtbaar wordt.</p>

      <div class="course-picker">
        <div class="picker-row">
          <label for="displayName"><strong>Schermnaam:</strong></label>
          <input id="displayName" type="text" placeholder="Bijvoorbeeld: Stijn">
        </div>
      </div>

      <div class="landing-actions">
        <button id="saveProfileButton" type="button">Opslaan</button>
      </div>

      <p id="profileMessage" class="intro"></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
   const supabaseClient = window.supabase.createClient(
  "https://leceithebntgxauivrdf.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlY2VpdGhlYm50Z3hhdWl2cmRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjkzNTgsImV4cCI6MjA4ODc0NTM1OH0.R3n8Gj6EpZ-7SnbcvfzoCdKgmkAWlFetEyUBsNjg2ns"
);

    const displayNameInput = document.getElementById("displayName");
    const saveProfileButton = document.getElementById("saveProfileButton");
    const profileMessage = document.getElementById("profileMessage");

    async function requireAuth() {
  const { data: sessionData, error: sessionError } = await supabaseClient.auth.getSession();
  console.log("profile getSession:", sessionData, sessionError);

  const { data, error } = await supabaseClient.auth.getUser();
  console.log("profile getUser:", data, error);

  if (error || !data?.user) {
    profileMessage.textContent = "Niet ingelogd op profile.html";
    return null;
  }

  return data.user;
}

    async function loadProfile() {
      const user = await requireAuth();
      if (!user) return null;

      const { data, error } = await supabaseClient
        .from("profiles")
        .select("display_name")
        .eq("id", user.id)
        .single();

      if (error) {
        profileMessage.textContent = "Profiel laden mislukt: " + error.message;
        return user;
      }

      if (data?.display_name) {
        displayNameInput.value = data.display_name;
      }

      return user;
    }

    async function saveProfile() {
      const user = await requireAuth();
      if (!user) return;

      const displayName = displayNameInput.value.trim();

      if (!displayName) {
        profileMessage.textContent = "Vul een schermnaam in.";
        return;
      }

      profileMessage.textContent = "Bezig met opslaan...";

      const { error } = await supabaseClient
        .from("profiles")
        .upsert(
          {
            id: user.id,
            display_name: displayName
          },
          {
            onConflict: "id"
          }
        );

      if (error) {
        profileMessage.textContent = "Opslaan mislukt: " + error.message;
        return;
      }

      window.location.href = "index.html";
    }

    saveProfileButton.addEventListener("click", saveProfile);

    loadProfile();
  </script>
</body>
</html>


<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KennisSprint</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
   <section class="card">
  <div style="display:flex; justify-content:flex-end; margin-bottom:24px; position:relative;">
    <button id="accountButton" type="button" class="account-button" hidden>Account</button>
<div
  id="accountMenu"
  hidden
  style="position:absolute; top:100%; right:0; margin-top:8px; background:#fff; border:1px solid #d1d5db; border-radius:12px; padding:8px; min-width:180px; box-shadow:0 10px 30px rgba(0,0,0,0.08);"
>
  <button
    id="profileButton"
    type="button"
    style="width:100%; text-align:left; background:none; border:none; padding:10px 12px; border-radius:8px; cursor:pointer;"
  >
    Ga naar profiel
  </button>

  <button
    id="logoutButton"
    type="button"
    style="width:100%; text-align:left; background:none; border:none; padding:10px 12px; border-radius:8px; cursor:pointer;"
  >
    Uitloggen
  </button>
</div>
  </div>

  <h1 id="pageHeading">KennisSprint</h1>
      <p id="pageIntro" class="intro">
        Kies eerst een vak, niveau en jaar om naar de juiste cursus te gaan.
      </p>

      <div class="course-picker">
        <div class="picker-row">
          <label for="subjectSelect"><strong>Vak:</strong></label>
          <select id="subjectSelect">
            <option value="">Kies vak</option>
          </select>
        </div>

        <div class="picker-row">
          <label for="levelSelect"><strong>Niveau:</strong></label>
          <select id="levelSelect">
            <option value="">Kies niveau</option>
          </select>
        </div>

        <div class="picker-row">
          <label for="gradeSelect"><strong>Jaar:</strong></label>
          <select id="gradeSelect">
            <option value="">Kies jaar</option>
          </select>
        </div>
      </div>

      <div class="landing-actions">
        <button id="openCourseButton" type="button">Open cursus</button>
      </div>

      <p id="selectionMessage" class="intro"></p>
    </section>
  </main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>

<script type="module">
  import { courseCatalog } from "./data.js";

  const supabase = window.supabaseClient;
  async function requireAuth() {
    const { data, error } = await supabase.auth.getUser();

    if (error || !data?.user) {
      window.location.href = "login.html";
      return null;
    }

    return data.user;
  }

   const subjectSelect = document.getElementById("subjectSelect");
  const levelSelect = document.getElementById("levelSelect");
  const gradeSelect = document.getElementById("gradeSelect");
  const openCourseButton = document.getElementById("openCourseButton");
  const selectionMessage = document.getElementById("selectionMessage");
 const accountButton = document.getElementById("accountButton");
const accountMenu = document.getElementById("accountMenu");
const logoutButton = document.getElementById("logoutButton");
const profileButton = document.getElementById("profileButton");
  function getUniqueValues(key, courses) {
    return [...new Set(courses.map(course => course[key]))];
  }

  function populateSelect(selectElement, values, placeholder, selectedValue = "") {
    selectElement.innerHTML = "";

    const placeholderOption = document.createElement("option");
    placeholderOption.value = "";
    placeholderOption.textContent = placeholder;
    selectElement.appendChild(placeholderOption);

    values.forEach((value) => {
      const option = document.createElement("option");
      option.value = value;
      option.textContent = value;

      if (value === selectedValue) {
        option.selected = true;
      }

      selectElement.appendChild(option);
    });
  }

  function getCoursesBySubject(subject) {
    return courseCatalog.filter(course => course.subject === subject);
  }

  function getCoursesBySubjectAndLevel(subject, level) {
    return courseCatalog.filter(
      course => course.subject === subject && course.level === level
    );
  }

  function findCourse(subject, level, grade) {
    return courseCatalog.find(
      course =>
        course.subject === subject &&
        course.level === level &&
        course.grade === grade
    );
  }

  function refreshLevelSelect() {
    const selectedSubject = subjectSelect.value;

    if (!selectedSubject) {
      populateSelect(levelSelect, [], "Kies niveau");
      populateSelect(gradeSelect, [], "Kies jaar");
      return;
    }

    const coursesForSubject = getCoursesBySubject(selectedSubject);
    const availableLevels = getUniqueValues("level", coursesForSubject);

    populateSelect(levelSelect, availableLevels, "Kies niveau");
    populateSelect(gradeSelect, [], "Kies jaar");
  }

  function refreshGradeSelect() {
    const selectedSubject = subjectSelect.value;
    const selectedLevel = levelSelect.value;

    if (!selectedSubject || !selectedLevel) {
      populateSelect(gradeSelect, [], "Kies jaar");
      return;
    }

    const coursesForSubjectAndLevel = getCoursesBySubjectAndLevel(
      selectedSubject,
      selectedLevel
    );

    const availableGrades = getUniqueValues("grade", coursesForSubjectAndLevel);

    populateSelect(gradeSelect, availableGrades, "Kies jaar");
  }

  function initSelectors() {
    const subjects = getUniqueValues("subject", courseCatalog);
    populateSelect(subjectSelect, subjects, "Kies vak");
    populateSelect(levelSelect, [], "Kies niveau");
    populateSelect(gradeSelect, [], "Kies jaar");
  }

  subjectSelect.addEventListener("change", () => {
    refreshLevelSelect();
    selectionMessage.textContent = "";
  });

  levelSelect.addEventListener("change", () => {
    refreshGradeSelect();
    selectionMessage.textContent = "";
  });

  gradeSelect.addEventListener("change", () => {
    selectionMessage.textContent = "";
  });

  openCourseButton.addEventListener("click", () => {
    const subject = subjectSelect.value;
    const level = levelSelect.value;
    const grade = gradeSelect.value;

    if (!subject || !level || !grade) {
      selectionMessage.textContent = "Kies eerst vak, niveau en jaar.";
      return;
    }

    const course = findCourse(subject, level, grade);

    if (!course) {
      selectionMessage.textContent = "Voor deze combinatie bestaat nog geen cursus.";
      return;
    }

    window.location.href =
      "course.html?course=" + encodeURIComponent(course.id);
  });

  async function showAccountButton(user) {
    if (!accountButton) return;

    const { data, error } = await supabase
      .from("profiles")
      .select("display_name")
      .eq("id", user.id)
      .maybeSingle();

    if (error) {
      console.error("Accountnaam laden mislukt:", error);
      accountButton.textContent = user.email || "Account";
      accountButton.hidden = false;
      return;
    }

    const name = data?.display_name?.trim();

    if (name) {
      accountButton.textContent = name;
    } else {
      accountButton.textContent = user.email || "Account";
    }

    accountButton.hidden = false;
  }
  
async function logout() {
  const { error } = await supabase.auth.signOut();

  if (error) {
    console.error("Uitloggen mislukt:", error);
    alert("Uitloggen mislukt: " + error.message);
    return;
  }

  window.location.href = "login.html";
}

function bindAccountMenu() {
  if (accountButton && accountMenu) {
    accountButton.addEventListener("click", () => {
      accountMenu.hidden = !accountMenu.hidden;
    });
  }

  if (logoutButton) {
    logoutButton.addEventListener("click", logout);
  }

  document.addEventListener("click", (event) => {
    if (!accountButton || !accountMenu) return;
    if (accountMenu.hidden) return;

    const clickedInsideButton = accountButton.contains(event.target);
    const clickedInsideMenu = accountMenu.contains(event.target);

    if (!clickedInsideButton && !clickedInsideMenu) {
      accountMenu.hidden = true;
    }
  });
}

async function ensureProfileComplete(user) {
  const { data, error } = await supabase
    .from("profiles")
    .select("display_name")
    .eq("id", user.id)
    .maybeSingle();

  if (error) {
    console.error("Profielcontrole mislukt:", error);
    return false;
  }

  const displayName = data?.display_name?.trim();

  if (!displayName) {
    window.location.href = "profile.html";
    return false;
  }

  return true;
}

async function bootIndex() {
  const user = await requireAuth();
  if (!user) return;

  const profileComplete = await ensureProfileComplete(user);
  if (!profileComplete) return;

  await showAccountButton(user);
  bindAccountMenu();
  initSelectors();
}

bootIndex();

</script>
</body>
</html>

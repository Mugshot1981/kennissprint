
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KennisSprint Login</title>
</head>
 <body>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f5f7fb;
      color: #0f172a;
    }

    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .login-card {
      width: 100%;
      max-width: 460px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      padding: 40px 32px;
      box-sizing: border-box;
    }

    .login-title {
      margin: 0 0 28px 0;
      text-align: center;
      font-size: 3rem;
      line-height: 1.05;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-weight: 700;
      font-size: 1rem;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font: inherit;
      box-sizing: border-box;
    }

    .login-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }

    .login-actions button {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      font: inherit;
      cursor: pointer;
    }

    #loginButton {
      background: #0f172a;
      color: #ffffff;
      border: none;
    }

 #registerButton,
#forgotPasswordButton,
#saveNewPasswordButton {
  background: transparent;
  color: #0f172a;
  border: 1px solid #cbd5e1;
}

    #debugOutput {
      margin-top: 16px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.85rem;
      color: #475569;
    }
  </style>

  <main class="login-page">
    <section class="login-card">
      <h1 class="login-title">KennisSprint</h1>

      <div class="login-form">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input id="email" type="email" placeholder="jouw@email.nl">
        </div>

        <div class="form-group">
          <label for="password">Wachtwoord</label>
          <input id="password" type="password" placeholder="Vul je wachtwoord in">
        </div>

       <div class="login-actions">
  <button id="loginButton" type="button">Inloggen</button>
  <button id="registerButton" type="button">Aanmelden</button>
  <button id="forgotPasswordButton" type="button">Wachtwoord vergeten?</button>
</div>

<div id="recoveryBox" hidden style="margin-top: 18px; display: flex; flex-direction: column; gap: 12px;">
  <div class="form-group">
    <label for="newPassword">Nieuw wachtwoord</label>
    <input id="newPassword" type="password" placeholder="Nieuw wachtwoord">
  </div>

  <div class="form-group">
    <label for="confirmPassword">Herhaal nieuw wachtwoord</label>
    <input id="confirmPassword" type="password" placeholder="Herhaal nieuw wachtwoord">
  </div>

  <button id="saveNewPasswordButton" type="button">Nieuw wachtwoord opslaan</button>
</div>

        <pre id="debugOutput"></pre>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script>
    const supabaseClient = window.supabaseClient;

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const debugOutput = document.getElementById("debugOutput");
    const loginButton = document.getElementById("loginButton");
    const registerButton = document.getElementById("registerButton");

   async function redirectIfAlreadyLoggedIn() {
  const { data, error } = await supabaseClient.auth.getUser();

  console.log("login getUser:", data, error);

  const user = data?.user;

  if (!user) return;

  if (!user.email_confirmed_at) {
    await supabaseClient.auth.signOut();
    debugOutput.textContent = "Bevestig eerst je e-mailadres voordat je kunt inloggen.";
    return;
  }

  window.location.href = "index.html";
}

async function login() {
  const email = emailInput.value.trim();
  const password = passwordInput.value;

  if (!email || !password) {
    debugOutput.textContent = "Vul e-mail en wachtwoord in.";
    return;
  }

  debugOutput.textContent = "Bezig met inloggen...";

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  console.log("signInWithPassword result:", { data, error });

  if (error) {
    debugOutput.textContent = "FOUT: " + error.message;
    alert(error.message);
    return;
  }

  const user = data?.user;

  if (!user || !user.email_confirmed_at) {
    await supabaseClient.auth.signOut();
    debugOutput.textContent = "Bevestig eerst je e-mailadres via de link in je mail.";
    alert("Bevestig eerst je e-mailadres via de link in je mail.");
    return;
  }

  debugOutput.textContent = "OK: ingelogd.";
  window.location.href = "index.html";
}

    async function register() {
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      debugOutput.textContent = "Bezig met account aanmaken...";

      const { data, error } = await supabaseClient.auth.signUp({
        email,
        password
      });

      console.log("signUp result:", { data, error });

      if (error) {
        debugOutput.textContent = "FOUT: " + error.message;
        alert(error.message);
        return;
      }

      debugOutput.textContent = "OK: account aangemaakt. Log nu in.";
      alert("Account aangemaakt. Log nu in met je e-mail en wachtwoord.");
    }

    loginButton.addEventListener("click", login);
   registerButton.addEventListener("click", () => {
  window.location.href = "register.html";
});

    redirectIfAlreadyLoggedIn();
  </script>
</body>

  
</html>

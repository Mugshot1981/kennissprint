
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KennisSprint Login</title>
</head>
<body>

   <h1>KennisSprint</h1>

   <input id="email" type="email" placeholder="e-mail">
  <input id="password" type="password" placeholder="wachtwoord">
 
  <button id="loginButton">Inloggen</button>
  <button id="registerButton" type="button">Account aanmaken</button>
  <pre id="debugOutput"></pre>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabaseClient = window.supabase.createClient(
    "https://leceithebntgxauivrdf.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlY2VpdGhlYm50Z3hhdWl2cmRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjkzNTgsImV4cCI6MjA4ODc0NTM1OH0.R3n8Gj6EpZ-7SnbcvfzoCdKgmkAWlFetEyUBsNjg2ns"
  );

  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const debugOutput = document.getElementById("debugOutput");
  const loginButton = document.getElementById("loginButton");
  const registerButton = document.getElementById("registerButton");

  async function redirectIfAlreadyLoggedIn() {
    const { data, error } = await supabaseClient.auth.getUser();

    console.log("login getUser:", data, error);

    if (data?.user) {
      window.location.href = "profile.html";
    }
  }

  async function login() {
    const email = emailInput.value.trim();
    const password = passwordInput.value;

    debugOutput.textContent = "Bezig met inloggen...";

    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email,
      password
    });

    console.log("signInWithPassword result:", { data, error });

    if (error) {
      debugOutput.textContent = "FOUT: " + error.message;
      alert(error.message);
      return;
    }

    debugOutput.textContent = "OK: ingelogd.";
    window.location.href = "profile.html";
  }

  async function register() {
    const email = emailInput.value.trim();
    const password = passwordInput.value;

    debugOutput.textContent = "Bezig met account aanmaken...";

    const { data, error } = await supabaseClient.auth.signUp({
      email,
      password
    });

    console.log("signUp result:", { data, error });

    if (error) {
      debugOutput.textContent = "FOUT: " + error.message;
      alert(error.message);
      return;
    }

    debugOutput.textContent = "OK: account aangemaakt. Log nu in.";
    alert("Account aangemaakt. Log nu in met je e-mail en wachtwoord.");
  }

  loginButton.addEventListener("click", login);
  registerButton.addEventListener("click", register);

  redirectIfAlreadyLoggedIn();
</script>

</body>
</html>

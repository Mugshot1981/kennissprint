
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KennisSprint Login</title>
</head>
<body>

   <h1>KennisSprint</h1>

   <input id="email" type="email" placeholder="e-mail">
  <input id="password" type="password" placeholder="wachtwoord">
 
  <button id="loginButton">Inloggen</button>
  <button id="registerButton" type="button">Account aanmaken</button>
  <pre id="debugOutput"></pre>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = window.supabase.createClient(
      "https://leceithebntgxauivrdf.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlY2VpdGhlYm50Z3hhdWl2cmRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjkzNTgsImV4cCI6MjA4ODc0NTM1OH0.R3n8Gj6EpZ-7SnbcvfzoCdKgmkAWlFetEyUBsNjg2ns"
    );

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const debugOutput = document.getElementById("debugOutput");

      debugOutput.textContent = "Bezig met inloggen...";

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      console.log("signInWithPassword result:", { data, error });

      if (error) {
        debugOutput.textContent = "FOUT: " + error.message;
        alert(error.message);
        return;
      }

      debugOutput.textContent = "OK: ingelogd.";
      window.location.href = "index.html";
    }

    async function register() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const displayName = document.getElementById("displayName").value.trim();
      const debugOutput = document.getElementById("debugOutput");

      if (!displayName) {
        debugOutput.textContent = "FOUT: vul een gebruikersnaam in.";
        alert("Vul een gebruikersnaam in.");
        return;
      }

      debugOutput.textContent = "Bezig met account aanmaken...";

      const { data, error } = await supabaseClient.auth.signUp({
        email,
        password
      });

      console.log("signUp result:", { data, error });

      if (error) {
        debugOutput.textContent = "FOUT: " + error.message;
        alert(error.message);
        return;
      }

      const userId = data?.user?.id;

      if (!userId) {
        debugOutput.textContent = "FOUT: account aangemaakt zonder user id.";
        alert("Account aangemaakt zonder user id.");
        return;
      }

      const { error: profileError } = await supabaseClient
        .from("profiles")
        .upsert(
          {
            id: userId,
            display_name: displayName
          },
          {
            onConflict: "id"
          }
        );

      if (profileError) {
        debugOutput.textContent = "FOUT profiel: " + profileError.message;
        alert(profileError.message);
        return;
      }

      debugOutput.textContent = "OK: account aangemaakt. Log nu in.";
      alert("Account aangemaakt. Log nu in met je e-mail en wachtwoord.");
    }

    document.getElementById("loginButton").addEventListener("click", login);
    document.getElementById("registerButton").addEventListener("click", register);
  </script>

</body>
</html>



<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title id="pageTitle">KennisSprint</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
<main class="page">

<section class="card">

<h1 id="pageHeading">KennisSprint</h1>

<p id="pageIntro" class="intro">
Oefen per hoofdstuk de belangrijkste begrippen met multiple choice.
</p>

<div class="course-picker">
  <div class="picker-row">
    <label for="subjectSelect"><strong>Vak:</strong></label>
  <select id="subjectSelect" data-placeholder="Kies vak">
      <option value="">Kies vak</option>
    </select>
  </div>

  <div class="picker-row">
    <label for="levelSelect"><strong>Niveau:</strong></label>
  <select id="levelSelect" data-placeholder="Kies niveau">
      <option value="">Kies niveau</option>
    </select>
  </div>

  <div class="picker-row">
    <label for="gradeSelect"><strong>Jaar:</strong></label>
  <select id="gradeSelect" data-placeholder="Kies jaar">
      <option value="">Kies jaar</option>
    </select>
  </div>
</div>

<div class="controls">

<!-- hoofdstukken -->
<div class="form-row chapter-row">

<label for="chapterSelect">Kies hoofdstukken:</label>

<div class="chapter-tiles-wrap">

<div id="chapterTileGrid" class="chapter-tile-grid"></div>

<select id="chapterSelect" multiple size="5" class="hidden"></select>

</div>

</div>


<!-- oefenmethode -->
<div class="form-row form-row-bottom">

<label for="modeSelect">Oefenmethode:</label>

<select id="modeSelect">

<option value="term-to-answer">
Begrip → beschrijving
</option>

<option value="answer-to-term">
Beschrijving → begrip
</option>

<option value="years">
Jaartallen → gebeurtenis
</option>

<option value="event-years">
Gebeurtenis → jaartal
</option>
  
</select>

</div>


<!-- start -->
<div class="form-row form-row-button">

<div></div>

<button id="startButton">
Start oefenen
</button>

</div>

</div>



<div id="quizArea" class="quiz-area hidden">


<div class="scoreboard">

<div class="quiz-topbar">

<div class="quiz-session-info">

<div id="quizSessionTitle" class="quiz-session-title"></div>

<div id="quizSessionMode" class="quiz-session-mode"></div>

</div>

<button id="stopButton" type="button">
Stoppen
</button>

</div>




<div class="questionline">
Vraag
<span id="questionNumber">0</span> /
<span id="questionTotal">0</span>
</div>


<div class="progressbar">
<div id="progressFill"></div>
</div>


<div class="stars">
  <div class="stars-base">★★★★★</div>
  <div id="starsFill" class="stars-fill">★★★★★</div>
</div>

</div>



<div class="question-box">

<div id="questionLabel" class="question-label">
BEGRIP
</div>

<h2 id="termDisplay">
Begrip komt hier
</h2>

</div>


<div id="answers" class="answers"></div>


<div id="feedback" class="feedback"></div>


<div class="quiz-actions">

<button id="nextButton" class="hidden">
Volgende vraag
</button>

</div>



<div id="endScreen" class="end-screen hidden">

<h3>Hoofdstuk afgerond</h3>

<p>
Eindscore:
<span id="finalScoreText">0 / 0</span>
</p>

<p id="wrongCountText"></p>

<div id="finalStars" class="score-stars">
☆☆☆☆☆
</div>

<button id="restartButton">
Opnieuw oefenen
</button>

<button id="retryWrongButton" class="hidden">
Oefen fouten opnieuw
</button>

</div>


</div>

</section>

</main>


<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>

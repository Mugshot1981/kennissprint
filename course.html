<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KennisSprint</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <h1 id="pageHeading">Cursus</h1>
      <p id="pageIntro" class="intro">
        Oefen per hoofdstuk de belangrijkste begrippen met multiple choice.
      </p>

      <h2>Kies hoofdstukken:</h2>

      <select id="chapterSelect" multiple hidden></select>
      <div id="chapterTileGrid" class="chapter-tile-grid"></div>

      <div class="mode-picker">
        <label for="modeSelect"><strong>Oefenvorm:</strong></label>
        <select id="modeSelect">
          <option value="answer-to-term">Beschrijving → begrip</option>
          <option value="term-to-answer">Begrip → beschrijving</option>
          <option value="years">Jaartal → gebeurtenis</option>
          <option value="event-years">Gebeurtenis → jaartal</option>
        </select>
      </div>

      <div class="landing-actions">
        <button id="startButton" type="button">Start oefenen</button>
      </div>
    </section>

    <section id="quizArea" class="card hidden">
      <div class="quiz-header">
        <div>
          <div id="quizSessionTitle" class="quiz-session-title"></div>
          <div id="quizSessionMode" class="quiz-session-mode"></div>
        </div>
        <button id="stopButton" type="button">Stop</button>
      </div>

      <div class="score-bar">
        <div class="score-line">
          <span>Goed: <strong id="scoreCorrect">0</strong></span>
          <span>Totaal: <strong id="scoreTotal">0</strong></span>
        </div>

        <div class="stars-track">
          <div id="starsFill" class="stars-fill"></div>
        </div>

        <div class="progress-line">
          <span>Vraag <strong id="questionNumber">0</strong> / <strong id="questionTotal">0</strong></span>
        </div>

        <div class="progress-track">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>

      <div class="question-card">
        <div id="questionLabel" class="question-label">Vraag</div>
        <div id="termDisplay" class="term-display"></div>
        <div id="answers" class="answers"></div>
        <div id="feedback" class="feedback"></div>
        <button id="nextButton" class="hidden" type="button">Volgende</button>
      </div>
    </section>

    <section id="endScreen" class="card hidden">
      <h2>Set afgerond</h2>
      <p id="finalScoreText"></p>
      <p id="finalStars"></p>
      <p id="wrongCountText"></p>

      <div class="landing-actions">
        <button id="restartButton" type="button">Opnieuw</button>
        <button id="retryWrongButton" type="button">Oefen fouten opnieuw</button>
      </div>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
